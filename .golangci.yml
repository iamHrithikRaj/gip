linters:
  enable:
    # Standard Go tools
    - gofmt         # Check formatting
    - govet         # Vet examines Go source code
    - errcheck      # Check error returns
    
    # Static analysis
    - staticcheck   # Advanced static analysis
    - gosimple      # Suggest code simplifications
    - unused        # Find unused code
    - ineffassign   # Detect ineffectual assignments
    - typecheck     # Parse and type-check code
    
    # Code quality
    - misspell      # Check spelling
    - gocyclo       # Cyclomatic complexity
    - dupl          # Detect duplicate code
    - goconst       # Find repeated strings that could be constants
    - godot         # Check comments end in period
    
    # Performance
    - prealloc      # Find slice declarations that could be preallocated
    
    # Error handling
    - errorlint     # Find misuses of errors
    
  disable:
    - gomnd         # Avoid "magic number" detector (too noisy)
    - funlen        # Function length (too strict for tests)
    - lll           # Line length (handled by formatter)

linters-settings:
  gocyclo:
    min-complexity: 15  # Cyclomatic complexity threshold
  
  dupl:
    threshold: 100      # Tokens for duplicate detection
  
  misspell:
    locale: US
  
  errcheck:
    check-type-assertions: true
    check-blank: false
  
  govet:
    check-shadowing: true

issues:
  exclude-rules:
    # Exclude test files from certain linters
    - path: _test\.go
      linters:
        - dupl        # Tests can have similar structure
        - goconst     # Tests can repeat strings
        - gocyclo     # Test functions can be complex
    
    # Exclude certain error checks in test helpers
    - path: tests/helpers/
      linters:
        - errcheck
  
  max-issues-per-linter: 0
  max-same-issues: 0

run:
  timeout: 5m
  tests: true
  skip-dirs:
    - .gip
    - vendor
  skip-files:
    - ".*\\.pb\\.go$"  # Exclude generated protobuf files

output:
  format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
  uniq-by-line: true
  sort-results: true
